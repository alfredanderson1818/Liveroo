<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="cp"><rect width="512" height="512" rx="112"/></clipPath>
  </defs>

  <rect width="512" height="512" fill="#111111" rx="112"/>

  <g clip-path="url(#cp)">
    <!-- Bold white "L" — centered -->
    <rect x="96" y="90" width="118" height="330" rx="24" fill="white"/>
    <rect x="96" y="308" width="320" height="112" rx="24" fill="white"/>

    <!-- Red EN VIVO badge overlapping bottom-right of L -->
    <rect x="228" y="358" width="224" height="66" rx="18" fill="#D42B2B"/>
    <circle cx="254" cy="391" r="10" fill="white"/>
    <text x="368" y="403" text-anchor="middle"
      font-family="Poppins, Arial, sans-serif"
      font-weight="900" font-size="28" letter-spacing="2" fill="white">EN VIVO</text>
  </g>
</svg>
